<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>설정 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap"
    rel="stylesheet"
  />
</head>
<body class="bg-white text-black font-['Inter'] relative overflow-hidden" style="height:1303px;">

  <div class="setting relative w-full h-[1303px] overflow-hidden text-left text-base">

    <!-- 프로필 -->
    <div
      class="absolute top-[105px] left-[95px] w-[157px] h-[75px] text-4xl inline-block"
    >
      프로필
    </div>

    <!-- 회색 박스 -->
    <div
      class="absolute top-[73px] left-[52px] w-[220px] h-[140px] bg-gray-300"
    ></div>

    <!-- QnA 목록 -->
    <div
      class="absolute top-[513px] left-[46px]"
    >
      <p class="m-0">다크모드</p>
      <p class="m-0">&nbsp;</p>
      <p class="m-0">국적변경</p>
      <p class="m-0">&nbsp;</p>
      <p class="m-0">QnA</p>
      <p class="m-0">&nbsp;</p>
      <p class="m-0">기록장</p>
    </div>

    <!-- 이미지 -->
    <img
      src="국적 변경.svg"
      alt=""
      class="absolute top-[1203px] left-[41px] w-[244px] h-[75px]"
    />

  </div>
</body>
</html>
