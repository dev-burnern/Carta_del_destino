<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Roboto:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div class="w-full bg-[#9eb177] h-[200px] flex items-center justify-center relative px-10">
  <!-- 로고 타원 (완전 중앙) -->
  <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[535px] h-[78px] bg-gray-300 rounded-full rotate-[2deg] flex items-center justify-center">
    <span class="text-3xl font-bold">로고</span>
  </div>

  <!-- 오른쪽 로그인/회원가입 + 햄버거 버튼 그룹 -->
  <div class="flex items-center space-x-4 absolute right-10 top-1/2 -translate-y-1/2">
    <!-- 로그인/회원가입 세로 스택 -->
    <div class="flex flex-col space-y-2 text-lg font-['Inter'] text-black">
      <button>로그인</button>
      <button>회원가입</button>
    </div>

    <!-- 햄버거 버튼 -->
    <button id="hamburger-btn" class="relative z-50 flex flex-col justify-between w-10 h-8 focus:outline-none group">
      <span class="hamburger-line block h-1.5 w-full bg-black rounded transition-all duration-300 group-[.active]:rotate-45 group-[.active]:translate-y-3"></span>
      <span class="hamburger-line block h-1.5 w-full bg-black rounded transition-all duration-300 group-[.active]:opacity-0"></span>
      <span class="hamburger-line block h-1.5 w-full bg-black rounded transition-all duration-300 group-[.active]:-rotate-45 group-[.active]:-translate-y-3"></span>
    </button>
  </div>
</div>

<!-- 슬라이드 메뉴 -->
<div id="slide-menu" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-40">
  <div class="p-6 h-full overflow-y-auto">
    <!-- 메뉴 헤더 -->
    <div class="flex justify-between items-center mb-8 pt-4">
      <h2 class="text-2xl font-bold text-gray-800">메뉴</h2>
      <button id="close-btn" class="text-gray-500 hover:text-gray-700 text-2xl">×</button>
    </div>

    <!-- 메뉴 항목들 -->
    <nav class="space-y-4">
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">홈</a>
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">카드 리딩</a>
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">타로 상담</a>
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">설정</a>
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">고객센터</a>
      <a href="#" class="block py-3 px-4 text-lg text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-200">마이페이지</a>
    </nav>
  </div>
</div>

<!-- 오버레이 배경 -->
<div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 opacity-0 invisible transition-all duration-300 z-30"></div>

<!-- 기존 페이지 내용 -->
<div class="bg-gray-300 w-[359px] h-[484px] mx-auto relative">
  <div class="absolute top-[200px] left-1/2 -translate-x-1/2 font-medium text-xl">카드</div>
</div>

<div class="bg-gray-300 w-[653px] h-[155px] mx-auto mt-10 relative">
  <div class="absolute top-4 left-1/2 -translate-x-1/2 font-medium text-lg">자신의 고민적기</div>
</div>

<div class="w-[187px] h-[61px] bg-gray-300 mx-auto mt-12 text-center">
  <div class="text-2xl font-medium pt-3">카드 룰렛</div>
</div>

<hr class="w-[90%] border-t-2 border-gray-400 mx-auto my-10" />

<div class="text-center text-[#9eb177] text-lg font-['Inter'] px-4 mb-20">
  <p class="mb-2">당신의 이야기를 듣고 싶어요. 카드를 펼치는 건 단순한 점이 아니라, 삶에 귀 기울이는 작은 용기입니다.</p>
  <p>운명이란, 당신이 만들어가는 이야기예요.</p>
</div>

<div class="flex justify-end pr-10 pb-20">
  <button aria-label="챗봇 열기" class="focus:outline-none">
    <img src="챗봇.png" alt="챗봇" class="w-[137px] h-[115px] rounded-full object-cover" />
  </button>
</div>

<script src="hamburger.js"></script>
</body>
</html>
