<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen flex items-center justify-center bg-white font-['Inter']">
    <div class="w-full max-w-lg border border-gray-200 rounded-xl p-10 flex flex-col items-center shadow-md">
    <h2 class="w-full text-2xl font-extrabold text-black mb-8 text-left">이메일과 비밀번호를<br/>입력해주세요.</h2>
    <form class="w-full flex flex-col space-y-4" id="loginForm">
        <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-[#9eb177]" placeholder="sample@gmail.com" />
        <label for="password" class="block text-gray-700 mt-2 mb-1">비밀번호</label>
        <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-[#9eb177]" placeholder="영문, 숫자, 특수문자 포함 8자 이상" />
        <button type="submit" class="w-full py-3 mt-4 bg-gray-300 text-white font-semibold rounded-lg cursor-not-allowed" disabled>로그인</button>
        <div class="flex items-center mt-2">
        <input type="checkbox" id="auto-login" class="mr-2">
        <label for="auto-login" class="text-sm text-black">자동 로그인</label>
        </div>
        <div class="w-full flex justify-end text-xs text-gray-500 mt-2 space-x-2">
        <a href="#" class="hover:underline">계정 찾기</a>
        <span>|</span>
        <a href="#" class="hover:underline">비밀번호 재설정</a>
        </div>
    </form>
    <hr class="w-full border-t border-gray-300 my-8" />
    <div class="flex justify-center space-x-8 mt-2">
        <img src="kakao.png" alt="카카오" class="w-10 h-10" />
        <img src="icon/btnW_축약형.png" alt="네이버" class="w-10 h-10" />
        <img src="d.png" alt="D" class="w-10 h-10" />
    </div>
    </div>
    <script src="Login.js"></script>
</body>
</html>
