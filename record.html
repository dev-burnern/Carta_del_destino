<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>기록장</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen font-[Inter] text-black">

  <!-- ✅ 상단 네비게이션 바 -->
  <nav class="w-full py-6 relative flex items-center px-8" style="background-color: #9EB177;">
    <div class="flex-1"></div>
    <div class="absolute left-1/2 transform -translate-x-1/2 text-2xl font-bold tracking-widest">
      로고
    </div>
    <div class="flex-1 flex items-center justify-end space-x-4">
      <button class="text-base font-medium">Login</button>
      <button class="ml-2">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ✅ 기록장 제목 -->
  <main class="flex flex-col items-center justify-start py-12 px-4">
    <h1 class="text-3xl font-semibold mb-8">기 록 장</h1>

    <!-- ✅ 카드 그리드 -->
    <div id="cardGrid" class="grid grid-cols-5 gap-6">
      <!-- 카드들은 JS로 생성됨 -->
    </div>
  </main>

  <!-- ✅ 카드 렌더링 스크립트 -->
  <script>
    const MAX_CARDS = 15;
    const cardGrid = document.getElementById('cardGrid');
    const records = JSON.parse(localStorage.getItem('tarot_dates') || '[]');

    function renderCards() {
      cardGrid.innerHTML = '';
      for (let i = 0; i < MAX_CARDS; i++) {
        const card = document.createElement('div');
        card.className = "relative w-[80px] h-[110px] bg-gray-300 rounded-lg flex items-center justify-center font-semibold cursor-pointer hover:bg-gray-400";

        if (records[i]) {
          const dateTag = document.createElement('div');
          dateTag.className = "absolute top-1 left-1 text-xs font-semibold bg-white/70 px-2 py-0.5 rounded";
          dateTag.textContent = records[i];
          card.appendChild(dateTag);
        }

        card.addEventListener('click', () => {
          window.location.href = `card.html?cardId=${i}`;
        });

        cardGrid.appendChild(card);
      }
    }

    renderCards();
  </script>
</body>
</html>
