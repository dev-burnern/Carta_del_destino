<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen flex items-center justify-center bg-[#f5f6fa] font-['Inter']">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-10 flex flex-col items-center">
    <h1 class="text-3xl font-bold mb-8 text-[#9eb177]">로그인</h1>
    <form class="w-full flex flex-col space-y-6" id="loginForm">
      <div>
        <label for="email" class="block text-gray-700 mb-2">이메일</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#9eb177]" placeholder="이메일을 입력하세요" />
      </div>
      <div>
        <label for="password" class="block text-gray-700 mb-2">비밀번호</label>
        <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#9eb177]" placeholder="비밀번호를 입력하세요" />
      </div>
      <button type="submit" class="w-full py-3 bg-[#9eb177] text-white font-semibold rounded-lg hover:bg-[#7d965e] transition">로그인</button>
    </form>
    <div class="w-full flex justify-between mt-6 text-sm text-gray-500">
      <a href="#" class="hover:underline">비밀번호 찾기</a>
      <a href="#" class="hover:underline">회원가입</a>
    </div>
  </div>
  <script src="Login.js"></script>
</body>
</html>
